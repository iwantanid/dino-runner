<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>DINO RUNNER</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background:#fff; touch-action:manipulation;
    -webkit-tap-highlight-color:transparent;
    -webkit-user-select:none; user-select:none;
    font-family:'Courier New',monospace;
    position:fixed; top:0; left:0;
  }
  canvas {
    display:block; position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    image-rendering:crisp-edges; image-rendering:pixelated;
    background:#fff;
  }
  #ui {
    position:absolute; top:0; right:0;
    padding:8px 12px; font-size:12px; color:#aaa;
    text-align:right; pointer-events:none;
    letter-spacing:1px;
  }
  #ui div { line-height:1.6; }
  #ui span { color:#535353; font-weight:bold; }
  #overlay {
    position:absolute; top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center;
    justify-content:center;
    pointer-events:none; z-index:10;
  }
  #msg {
    text-align:center; color:#535353;
    font-family:'Courier New',monospace;
  }
  #msg .title { font-size:clamp(16px,4vw,28px); font-weight:bold; letter-spacing:3px; margin-bottom:8px; }
  #msg .sub { font-size:clamp(10px,2.5vw,16px); letter-spacing:1px; }
  .hidden { display:none !important; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="ui">
  <div>HI <span id="hi">00000</span></div>
  <div><span id="score">00000</span></div>
  <div>STAGE <span id="stg">1</span></div>
</div>
<div id="overlay">
  <div id="msg">
    <div class="title" id="msgTitle"></div>
    <div class="sub" id="msgSub"></div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// ─── GAME STATE ───
let gameState = 'waiting';
let stage = 1, score = 0, obstaclesPassed = 0;
let hiScore = parseInt(localStorage.getItem('dinoHi')||'0');
let frame = 0, obstacleTimer = 0;
let obstacles = [], particles = [];

// ─── RESIZE ───
const GAME_W = 900, GAME_H = 300;
function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  let w, h;
  if (vw / vh > GAME_W / GAME_H) {
    h = vh * 0.88; w = h * (GAME_W / GAME_H);
  } else {
    w = vw * 0.96; h = w * (GAME_H / GAME_W);
  }
  if (w < 320) { w = 320; h = w * (GAME_H/GAME_W); }
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  canvas.width = GAME_W;
  canvas.height = GAME_H;
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 100));
resize();

// ─── CONSTANTS ───
const GROUND_Y = 250;
const DINO_X = 65;

const dino = {
  x: DINO_X, y: GROUND_Y,
  vy: 0, jumping: false,
  jumpPower: -9.5, gravity: 0.5
};

// ─── DRAW DINO (programmatic pixel art) ───
function drawDino(dx, dy, runFrame, jumping) {
  const P = 3; // pixel unit
  const cBody = '#535353';
  const cDark = '#3c3c3c';

  ctx.fillStyle = cBody;

  // ── HEAD ──
  // main head block
  ctx.fillRect(dx+21, dy-48, 15, 15);
  // head top bump
  ctx.fillRect(dx+18, dy-51, 6, 3);
  // snout extension
  ctx.fillRect(dx+33, dy-42, 6, 6);
  // lower jaw
  ctx.fillRect(dx+15, dy-36, 21, 6);
  // jaw corner
  ctx.fillRect(dx+12, dy-33, 6, 3);

  // ── BODY ──
  // main torso
  ctx.fillRect(dx+3, dy-30, 27, 15);
  // upper back curve
  ctx.fillRect(dx-3, dy-24, 12, 9);
  // lower belly
  ctx.fillRect(dx+6, dy-18, 18, 6);

  // ── TAIL ──
  ctx.fillRect(dx-9, dy-21, 9, 6);
  ctx.fillRect(dx-15, dy-18, 9, 4);
  ctx.fillRect(dx-21, dy-16, 9, 3);
  // tail tip
  ctx.fillRect(dx-24, dy-15, 6, 2);

  // ── SPIKES (back ridges) ──
  ctx.fillStyle = cDark;
  ctx.fillRect(dx+0, dy-33, 3, 3);
  ctx.fillRect(dx-3, dy-27, 3, 3);

  // ── ARM ──
  ctx.fillStyle = cBody;
  ctx.fillRect(dx+12, dy-21, 4, 9);

  // ── LEGS ──
  const legW = 6, legH = 12;
  ctx.fillStyle = cBody;
  if (jumping) {
    // tucked legs
    ctx.fillRect(dx+6, dy-15, legW, 5);
    ctx.fillRect(dx+18, dy-15, legW, 5);
  } else if (runFrame) {
    // stride: one forward, one back
    ctx.fillRect(dx+3, dy-15, legW, legH-3);   // back
    ctx.fillRect(dx+21, dy-15, legW, legH);     // front
  } else {
    // stride reversed
    ctx.fillRect(dx+3, dy-15, legW, legH);
    ctx.fillRect(dx+21, dy-15, legW, legH-3);
  }

  // ── EYE ──
  const eyeX = dx+24, eyeY = dy-45;
  ctx.fillStyle = '#fff';
  ctx.fillRect(eyeX, eyeY, 7, 7);
  ctx.fillStyle = '#000';
  ctx.fillRect(eyeX+2, eyeY+2, 3, 3);

  // ── MOUTH LINE ──
  ctx.fillStyle = cDark;
  ctx.fillRect(dx+18, dy-34, 15, 2);
}

// ─── DRAW OBSTACLE SPRITES ───
function drawCactusTall(x) {
  const P = 3, by = GROUND_Y;
  ctx.fillStyle = '#535353';
  // main trunk
  ctx.fillRect(x+9, by-48, 6, 48);
  // left arm
  ctx.fillRect(x, by-36, 9, 6);
  ctx.fillRect(x, by-42, 6, 9);
  // right arm
  ctx.fillRect(x+15, by-39, 9, 6);
  ctx.fillRect(x+18, by-45, 6, 9);
  // top
  ctx.fillRect(x+9, by-51, 6, 3);
}

function drawCactusShort(x) {
  const P = 3, by = GROUND_Y;
  ctx.fillStyle = '#535353';
  ctx.fillRect(x+9, by-30, 6, 30);
  ctx.fillRect(x, by-21, 9, 6);
  ctx.fillRect(x+15, by-24, 9, 6);
  ctx.fillRect(x+9, by-33, 6, 3);
}

function drawRock(x) {
  const P = 3, by = GROUND_Y;
  ctx.fillStyle = '#888';
  ctx.beginPath();
  ctx.moveTo(x, by);
  ctx.lineTo(x+6, by-21);
  ctx.lineTo(x+12, by-30);
  ctx.lineTo(x+21, by-30);
  ctx.lineTo(x+27, by-21);
  ctx.lineTo(x+33, by-9);
  ctx.lineTo(x+36, by);
  ctx.fill();
  ctx.fillStyle = '#999';
  ctx.fillRect(x+9, by-18, 15, 9);
}

// ─── DRAW ───
function drawGround() {
  ctx.fillStyle = '#535353';
  ctx.fillRect(0, GROUND_Y+2, GAME_W, 2);
  ctx.fillStyle = '#aaa';
  const spd = getSpeed();
  for (let i=(frame*spd)%30; i<GAME_W; i+=30) ctx.fillRect(i, GROUND_Y+4, 12, 1);
}

function drawScene() {
  ctx.clearRect(0, 0, GAME_W, GAME_H);
  drawGround();

  const runFrame = Math.floor(frame/6)%2===0;
  drawDino(dino.x, dino.y, runFrame, dino.jumping);

  for (let o of obstacles) {
    if (o.type==='cactusTall') drawCactusTall(o.x);
    else if (o.type==='cactusShort') drawCactusShort(o.x);
    else drawRock(o.x);
  }
  for (let p of particles) {
    ctx.fillStyle = `rgba(83,83,83,${p.life/p.maxLife})`;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }
}

function drawOverlay() {
  ctx.fillStyle = 'rgba(255,255,255,0.88)';
  ctx.fillRect(0, 0, GAME_W, GAME_H);
  ctx.textAlign = 'center';

  if (gameState==='waiting') {
    drawDino(GAME_W/2-21, GROUND_Y, true, false);
    ctx.fillStyle = '#535353';
    ctx.font = 'bold 22px "Courier New"';
    ctx.fillText('DINO RUNNER', GAME_W/2, GROUND_Y-80);
    ctx.font = '13px "Courier New"';
    ctx.fillText('TAP TO START', GAME_W/2, GROUND_Y+10);
  } else if (gameState==='stageClear') {
    ctx.fillStyle = '#535353';
    ctx.font = 'bold 20px "Courier New"';
    ctx.fillText(`STAGE ${stage-1} CLEAR!`, GAME_W/2, GAME_H/2-15);
    ctx.font = '13px "Courier New"';
    ctx.fillText('TAP FOR NEXT STAGE', GAME_W/2, GAME_H/2+20);
  } else if (gameState==='gameOver') {
    ctx.fillStyle = '#535353';
    ctx.font = 'bold 24px "Courier New"';
    ctx.fillText('G A M E  O V E R', GAME_W/2, GAME_H/2-15);
    ctx.font = '13px "Courier New"';
    ctx.fillText(`SCORE: ${score}  HI: ${hiScore}`, GAME_W/2, GAME_H/2+15);
    ctx.font = '12px "Courier New"';
    ctx.fillText('TAP TO RESTART', GAME_W/2, GAME_H/2+38);
  }
  ctx.textAlign = 'start';
}

// ─── STAGE CONFIG (easier early stages) ───
function getSpeed() {
  // Stage 1 starts slow at 3.5, gradually to 9
  return [3.5, 4.0, 4.5, 5.0, 5.5, 6.0, 6.5, 7.5, 8.5, 9.0][Math.min(stage-1,9)];
}
function getGap() {
  // Wider gaps in early stages
  const g = [[180,280],[170,260],[150,240],[130,210],[110,190],[95,170],[80,150],[70,135],[60,120],[55,105]][Math.min(stage-1,9)];
  return g[0]+Math.random()*(g[1]-g[0]);
}

function maybeSpawnObstacle() {
  obstacleTimer--;
  if (obstacleTimer > 0) return;
  const gap = getGap();
  if (obstacles.length>0) {
    const last = obstacles[obstacles.length-1];
    if (last.x + last.w + gap > GAME_W) return;
  }
  const types = stage<=3?['cactusShort']:stage<=5?['cactusShort','cactusTall']:stage<=7?['cactusTall','cactusShort','cactusShort']:['cactusTall','cactusShort','rock'];
  const t = types[Math.floor(Math.random()*types.length)];
  const widths = {cactusTall:72, cactusShort:72, rock:108};
  obstacles.push({x:GAME_W, type:t, w:widths[t], passed:false});
  // Longer delay between obstacles in early stages
  const delay = stage<=3 ? 25+Math.floor(Math.random()*15) : stage<=6 ? 18+Math.floor(Math.random()*12) : 12+Math.floor(Math.random()*10);
  obstacleTimer = delay;
}

// ─── COLLISION ───
function checkCollision() {
  const dB = {x:dino.x+8, y:dino.y-40, w:36, h:38};
  for (let o of obstacles) {
    const oB = {x:o.x+4, y:GROUND_Y-48, w:o.w-8, h:48};
    if (o.type==='cactusShort') oB.y = GROUND_Y-30;
    if (o.type==='rock') { oB.y = GROUND_Y-30; oB.h = 30; }
    if (dB.x<oB.x+oB.w && dB.x+dB.w>oB.x && dB.y<oB.y+oB.h && dB.y+dB.h>oB.y) return true;
  }
  return false;
}

function spawnParticles(x,y) {
  for (let i=0;i<15;i++) particles.push({
    x,y, vx:(Math.random()-.5)*3, vy:-2-Math.random()*3,
    life:20+Math.random()*15, maxLife:35, size:2+Math.floor(Math.random()*4)
  });
}

// ─── UPDATE ───
const OBS_CLEAR = 7; // fewer obstacles per stage
function update() {
  if (gameState!=='playing') return;
  frame++;

  if (dino.jumping) {
    dino.vy += dino.gravity;
    dino.y += dino.vy;
    if (dino.y>=GROUND_Y) { dino.y=GROUND_Y; dino.vy=0; dino.jumping=false; }
  }

  maybeSpawnObstacle();
  const spd = getSpeed();
  for (let o of obstacles) {
    o.x -= spd;
    if (!o.passed && o.x+o.w<dino.x) { o.passed=true; obstaclesPassed++; score+=10; }
  }
  obstacles = obstacles.filter(o=>o.x+o.w>-80);

  if (checkCollision()) {
    gameState='gameOver'; spawnParticles(dino.x+21, dino.y-25);
    if (score>hiScore) { hiScore=score; localStorage.setItem('dinoHi',hiScore); }
  }
  if (obstaclesPassed>=OBS_CLEAR) { gameState='stageClear'; if (stage<10) stage++; }

  particles = particles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;return p.life>0;});

  document.getElementById('score').textContent = String(score).padStart(5,'0');
  document.getElementById('hi').textContent = String(hiScore).padStart(5,'0');
  document.getElementById('stg').textContent = Math.min(stage,10);
}

function draw() { drawScene(); if (gameState!=='playing') drawOverlay(); }
function loop() { update(); draw(); requestAnimationFrame(loop); }

// ─── RESET ───
function resetGame(full) {
  if (full) { stage=1; score=0; }
  obstaclesPassed=0; obstacles=[]; particles=[]; obstacleTimer=40;
  dino.y=GROUND_Y; dino.vy=0; dino.jumping=false;
  document.getElementById('score').textContent='00000';
  document.getElementById('hi').textContent=String(hiScore).padStart(5,'0');
  document.getElementById('stg').textContent=stage;
}

// ─── INPUT ───
function doJump() {
  if (gameState==='waiting') { gameState='playing'; resetGame(true); return; }
  if (gameState==='stageClear') { resetGame(false); gameState='playing'; return; }
  if (gameState==='gameOver') { resetGame(true); gameState='playing'; return; }
  if (gameState==='playing' && !dino.jumping) {
    dino.vy = dino.jumpPower;
    dino.jumping = true;
  }
}

document.addEventListener('touchstart', e => { e.preventDefault(); doJump(); }, {passive:false});
document.addEventListener('keydown', e => {
  if (e.code==='Space'||e.code==='ArrowUp') { e.preventDefault(); doJump(); }
});
canvas.addEventListener('click', e => { e.preventDefault(); doJump(); });
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('gesturechange', e=>e.preventDefault());
document.addEventListener('gestureend', e=>e.preventDefault());

resetGame(true);
loop();
</script>
</body>
</html>
